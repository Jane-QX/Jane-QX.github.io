# Hexo & Butterfly 统一配置模板
# ⚠️ 修改原则：请先修改本模板，再由技能同步到博客根目录的 _config.yml

# =================================================================
# 1. 站点基础设置 (Site Settings) - [由 hexo-setup 维护]
# =================================================================
title: Jane's Blog           # 博客标题
subtitle: '记录成长与思考'     # 博客副标题
description: ''               # 网站描述
author: Jane                  # 作者名字
language: zh-CN               # 语言 (简体中文必须设为 zh-CN)
timezone: 'Asia/Shanghai'     # 时区
url: https://Jane-QX.github.io # 你的博客网址

# =================================================================
# 2. 主题与扩展 (Theme & Extensions) - [由 hexo-setup 维护]
# =================================================================
theme: butterfly              # 使用 Butterfly 主题

# =================================================================
# 3. Butterfly 主题个性化配置 (Theme Specific Settings) - [由 hexo-setup 维护]
# =================================================================
theme_config:
  # 顶部图片设置 (Banner)
  index_img: /img/my_bg.jpg         # 首页顶部背景图
  default_top_img: /img/my_bg.jpg   # 默认页面顶部图
  
  # 导航栏设置
  nav:
    logo:                           # 导航栏左侧 Logo
    display_title: true             # 是否显示站点标题
  
  # 网站背景设置
  background: 

  # 页脚设置
  footer_img: false                 # 页脚背景图 (true/false/图片路径)

# =================================================================
# 4. 部署设置 (Deployment) - [由 hexo-deploy 维护]
# =================================================================
deploy:
  type: git
  repo: git@github.com:Jane-QX/Jane-QX.github.io.git
  branch: gh-pages

# =================================================================
# 5. 其他高级设置 (Advanced Settings)
# =================================================================
new_post_name: :title.md
default_layout: post
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
per_page: 10
pagination_dir: page
